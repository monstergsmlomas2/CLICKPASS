# Instalar en la VM: sudo cp deploy/nginx-clickpass-backend.conf /etc/nginx/sites-available/clickpass-backend
# sudo ln -s /etc/nginx/sites-available/clickpass-backend /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# Luego: sudo certbot --nginx -d api.TU-DOMINIO.com  (agrega HTTPS automáticamente)

server {
    listen 80;
    server_name api.TU-DOMINIO.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
