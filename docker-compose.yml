services:
  postgres:
    image: postgres:16
    container_name: clickpass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clickpass
      POSTGRES_PASSWORD: clickpass
      POSTGRES_DB: clickpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clickpass -d clickpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: clickpass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
